<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Silk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ✅ 强制隐藏所有滚动条 */
        html, body {
            overflow: hidden !important;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        body {
            font-family: 'Noto Serif SC', 'Cormorant Garamond', Georgia, serif;
            background: linear-gradient(135deg, #FDF8F0 0%, #F5EDE0 50%, #EDE4D3 100%);
        }
        
        /* 隐藏webkit浏览器的滚动条 */
        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }
        
        /* 隐藏Firefox的滚动条 */
        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        /* 加载指示器 - 丝滑风格 */
        #loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #FDF8F0 0%, #F5EDE0 50%, #EDE4D3 100%);
        }
        
        #loading .logo {
            font-size: 48px;
            font-weight: 600;
            color: #C9A86C;
            letter-spacing: 8px;
            margin-bottom: 24px;
            font-family: 'Cormorant Garamond', Georgia, serif;
            text-transform: uppercase;
        }
        
        #loading .loader {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #C9A86C, transparent);
            border-radius: 2px;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { opacity: 0.3; transform: scaleX(0.5); }
            50% { opacity: 1; transform: scaleX(1); }
        }
        
        #loading .subtitle {
            margin-top: 20px;
            font-size: 14px;
            color: #A8894D;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div id="loading">
            <div class="logo">Silk</div>
            <div class="loader"></div>
            <div class="subtitle">Smooth & Simple</div>
        </div>
    </div>
    <script src="webApp.js?v=20260313-silk"></script>
    <script>
        console.log('🧵 Silk App Version: 20260313-silk');
        console.log('🌐 Environment: Development');
        console.log('✨ Silk');
    </script>
</body>
</html>
