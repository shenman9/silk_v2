name: CI Fast Validation

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-fast-validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  GRADLE_ARGS_COMMON: --no-daemon --stacktrace --warning-mode all

jobs:
  gradle-fast:
    name: Backend + Web + Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use official Gradle distribution on GitHub-hosted runner
        run: |
          if grep -q 'mirrors.cloud.tencent.com' gradle/wrapper/gradle-wrapper.properties; then
            sed -i 's#https\\://mirrors.cloud.tencent.com/gradle/gradle-8.4-bin.zip#https\\://services.gradle.org/distributions/gradle-8.4-bin.zip#' gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Validate silk.sh syntax
        run: bash -n silk.sh

      - name: Smoke check silk.sh status
        run: ./silk.sh status

      - name: Run backend, web, and desktop fast validation
        run: |
          ./gradlew $GRADLE_ARGS_COMMON \
            :backend:test \
            :frontend:webApp:compileProductionExecutableKotlinJs \
            :frontend:desktopApp:compileKotlin

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: |
            backend/build/reports/tests/test
            backend/build/test-results/test
          if-no-files-found: ignore

  android-compile:
    name: Android Debug Kotlin Compile
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use official Gradle distribution on GitHub-hosted runner
        run: |
          if grep -q 'mirrors.cloud.tencent.com' gradle/wrapper/gradle-wrapper.properties; then
            sed -i 's#https\\://mirrors.cloud.tencent.com/gradle/gradle-8.4-bin.zip#https\\://services.gradle.org/distributions/gradle-8.4-bin.zip#' gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Install Android SDK packages
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Write local.properties for Android plugin evaluation
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_DIR" ]; then
            echo "Android SDK path is unavailable after setup-android" >&2
            exit 1
          fi
          printf 'sdk.dir=%s\n' "$SDK_DIR" > local.properties

      - name: Run Android fast validation
        run: ./gradlew $GRADLE_ARGS_COMMON :frontend:androidApp:compileDebugKotlin
